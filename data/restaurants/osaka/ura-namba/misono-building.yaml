  last_verified: "2026-02-28"
  notes: "Built in 1956, Misono was once the heart of Osaka nightlife - cabarets, dance halls, saunas. Now it's a maze of independent bars, each with its own character. This isn't one restaurant - it's a destination. Start in the basement for izakaya vibes, then work your way up for cocktail bars. The kind of place even some Osaka locals don't know about."
