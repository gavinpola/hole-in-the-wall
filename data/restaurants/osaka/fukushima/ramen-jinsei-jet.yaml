  notes: "When this opened in 2010, Fukushima had few ramen shops. JET's success sparked the 'Fukushima ramen wars' - now the neighborhood is known as a ramen battleground. The broth is intensely chicken-forward, rich without being heavy. Perfect shime (final dish) after a Fukushima bar crawl. Tabelog 100 winner for Osaka ramen."
