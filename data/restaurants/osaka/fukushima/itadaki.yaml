  notes: "Most visitors to Osaka eat Osaka-style okonomiyaki. This place offers something different - the owner's Kyoto heritage brought to Osaka's foodie neighborhood. The negiyaki is lighter than standard okonomiyaki, more about the sweetness of those legendary green onions. The original sauce recipe has a spicy version for those who want heat. Perfect dinner before hitting Fukushima's bar scene."
