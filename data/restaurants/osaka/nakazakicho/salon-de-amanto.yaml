  confidence: high
  last_verified: "2026-02-28"
  notes: "When artist Jun Amanto opened this in 2001, Nakazakicho was a forgotten neighborhood of elderly residents in prewar houses. His renovation sparked a movement - now the whole area is a bohemian enclave of vintage shops and cafes. This is the original, and it still feels like the spiritual center of the neighborhood. Come for coffee, stay for the conversations."
