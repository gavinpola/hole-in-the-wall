  notes: "Not for the squeamish - this is proper Osaka horumon culture. The freshness of the offal allows them to serve it raw, which you won't find at tourist spots. The liver sashimi is silky and clean-tasting when this fresh. Osaka's working-class food heritage at its most authentic."
