  notes: "Founded 1934. The jinenjo (wild mountain yam) gives the noodles a distinctive springy texture you won't find elsewhere. Yes, tourists know about it. But 90 years of perfecting one craft means they've earned the reputation. Go for an early lunch, sit by the river, slurp loudly."
