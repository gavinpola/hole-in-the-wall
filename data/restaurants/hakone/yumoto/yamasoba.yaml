  last_verified: "2026-02-28"
  notes: "The jinenjo (wild mountain yam) is foraged from nearby mountains between October and March - that's peak season for authentic tororo. The yam is a natural binder, giving the soba its distinctive chewy texture. Perfect for tired marathon runners - the tororo is said to aid recovery. Hidden menu: their tempura tendon (rice bowl) is legendary among regulars."
