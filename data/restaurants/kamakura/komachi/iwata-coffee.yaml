  notes: "Not hidden, but deeply authentic. While tourists stream past to Komachi-dori shops, this 1945 kissaten remains a sanctuary. Nobel laureate Kawabata Yasunari wrote here. John Lennon and Yoko Ono visited. Now run by the third-generation owner. The pancakes became famous during Japan's retro-kissaten revival, but the soul of the place has never changed. Essential Kamakura."
